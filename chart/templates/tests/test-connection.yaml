apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "..fullname" . }}-test-connection"
  labels:
    {{- include "..labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: ssh-check
      image: alpine
      command: ['sh', '-c']
      args:
        - >
          apk add --no-cache openssh-client &&
          ssh -o StrictHostKeyChecking=no -p {{ .Values.service.port }}
          {{ include "..fullname" . }} exit
